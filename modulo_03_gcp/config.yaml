# ═══════════════════════════════════════════════════════════════════
#  modulo_03_gcp — Configuración central del módulo
# ═══════════════════════════════════════════════════════════════════

# ── Modelo LLM principal ──────────────────────────────────────────
# gemini-2.5-flash-lite  — versión lite: rápida, económica, soporta budget=0
# Alternativas (descomenta y ajusta thinking_budget):
#   gemini-2.5-flash  → thinking_budget: 0  (rápido, completo)
#   gemini-2.5-pro    → thinking_budget: 1024 (no soporta 0)
model:
  name: gemini-2.5-flash-lite
  location: us-central1
  thinking_budget: 0      # 0 = desactivado (soportado en flash-lite y flash)
  temperature: 0.3
  max_output_tokens: 2000

# ── Modelo de embeddings ──────────────────────────────────────────
embedding:
  model: text-embedding-004   # Modelo estable de Vertex AI
  dimension: 768

# ── Configuración RAG ─────────────────────────────────────────────
rag:
  # GCS — bucket existente del proyecto
  bucket: mlops-practices-wb-cap2-end_to_end
  bucket_prefix: modulo_03_rag/

  # ChromaDB — persistencia local
  chroma_path: data/chroma_db
  collection: mily_una_noches

  # Chunking
  chunk_size: 1000
  chunk_overlap: 200

  # Retrieval
  top_k: 5

  # Fuente de documentos (relativo a modulo_03_gcp/)
  database_path: src/database

  # Demo mode: limita las páginas indexadas para pruebas rápidas.
  # 0 = sin límite (índice completo, ~16 min para Las Mil y Una Noches)
  max_pages: 150

  # ── GCS Sync para ChromaDB ─────────────────────────────────────────────────
  # true  = después de indexar, sincroniza ChromaDB a GCS (visible en Console)
  # false = solo local
  sync_chroma_gcs: true
  chroma_gcs_prefix: modulo_03_rag/chroma_db/
